<!DOCTYPE html>
<html>
    <head>
        <title>Point Cloud Viewer</title>

        <style type="text/css">
            #info {
                color: #7ad7ff;
                font-family: 'Open Sans', sans-serif;
                position: absolute;
                top: 0;
                left: 0;
                padding: 0.3rem;
                background-color: #404040;
                z-index: 1;
            }
            @media (max-width: 600px) {
                #info,
                .dg {
                    display: none;
                }
            }
        </style>

        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="css/example.css">
        <link rel="stylesheet" type="text/css" href="css/LoadingScreen.css">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="viewerDiv">
            <div id="info"></div>
        </div>

        <div>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.6/dat.gui.min.js"></script>
            <script src="../dist/itowns.js"></script>
            <script src="js/GUI/LoadingScreen.js"></script>
            <script src="../dist/debug.js"></script>
            <script src="https://unpkg.com/camera-controls@2.7.0/dist/camera-controls.js"></script>
            <script type="text/javascript">
                window.THREE = itowns.THREE;
            </script>
            <script src="https://unpkg.com/three@0.124.0/examples/js/controls/OrbitControls.js"></script>
            <script type="text/javascript">
                var potreeLayer;
                var potree2Layer;
                var oldPostUpdate;
                var viewerDiv;
                var debugGui;
                var view;
                var controls;
                var clock = new THREE.Clock();
                var scene = new THREE.Scene();

                CameraControls.install( { THREE: THREE } );

                // Define crs projection that we will use (taken from https://epsg.io/3946, Proj4js section)
                itowns.proj4.defs('EPSG:3947', '+proj=lcc +lat_0=47 +lon_0=3 +lat_1=46.25 +lat_2=47.75 +x_0=1700000 +y_0=6200000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs +type=crs');

                viewerDiv = document.getElementById('viewerDiv');
                viewerDiv.style.display = 'block';

                debugGui = new dat.GUI();

                // TODO: do we really need to disable logarithmicDepthBuffer ?
                function createRenderer() {
                    const renderer = new THREE.WebGLRenderer({
                        alpha: true,
                        antialias: true,
                        powerPreference: "high-performance",
                        preserveDrawingBuffer: true
                    });
                    renderer.setSize(viewerDiv.clientWidth, viewerDiv.clientHeight);
                    renderer.setPixelRatio(window.devicePixelRatio);
                    renderer.info.autoReset = false;

                    // Improve color rendering
                    renderer.localClippingEnabled = true;
                    renderer.setClearColor(0x000000, 0);

                    // Increase start-up time to render
                    const pmremGenerator = new THREE.PMREMGenerator(renderer);
                    pmremGenerator.compileEquirectangularShader();

                    viewerDiv.appendChild(renderer.domElement);

                    return renderer;
                }

                // 1351190.537 6240402.554 52.429
                var placement = {
                    coord: new itowns.Coordinates('EPSG:3947', 1351190.537, 6240402.554, 52.429),
                    range: 100,
                    tilt: 45,
                    heading: -60
                }

                var customRenderer = createRenderer();
                var rendererSize = customRenderer.getSize(new THREE.Vector2());
                var customCamera = new THREE.PerspectiveCamera(60, rendererSize.width / rendererSize.height, 1, 10000);
                scene.add(customCamera);
                var globeView = new itowns.GlobeView(viewerDiv, placement, { camera: { cameraThree: customCamera }, renderer: customRenderer, scene3D: scene, noControls: true });
                // var view = new itowns.View('EPSG:3947', viewerDiv, { camera: { cameraThree: customCamera }, renderer: customRenderer, scene3D: scene });
                // view.mainLoop.gfxEngine.renderer.setClearColor(0x000000, 0);
                // view.mainLoop.gfxEngine.label2dRenderer.domElement.style.pointerEvents = 'none';

                // globeView.controls.minDistance = 50;

                itowns.Fetcher.json('./layers/JSONLayers/OPENSM.json').then(function _(config) {
                    config.source = new itowns.TMSSource(config.source);
                    var layer = new itowns.ColorLayer('Ortho', config);
                    globeView.addLayer(layer);
                });

                /*
                itowns.Fetcher.json('./layers/JSONLayers/Ortho.json').then(function _(config) {
                    config.source = new itowns.WMTSSource(config.source);
                    var layer = new itowns.ColorLayer(config.id, config);
                    globeView.addLayer(layer);
                });
                */

                customRenderer.domElement.addEventListener("mousedown", (event) => {
                    const result = view.pickObjectsAt(event, 10);
                    if (result.length > 0) {
                        this.controls.setOrbitPoint(result[0].point.x, result[0].point.y, result[0].point.z);
                    }
                });

                // Configure Point Cloud layer
                potreeLayer = new itowns.PotreeLayer('Geosnap 1', {
                    source: new itowns.PotreeSource({
                        file: 'cloud.js',
                        url: 'http://127.0.0.1:8080',
                        crs: globeView.referenceCrs,
                    }),
                });

                // add potreeLayer to scene
                function onLayerReady() {
                    var center = new itowns.THREE.Vector3();
                    var size = new itowns.THREE.Vector3();

                    potreeLayer.root.bbox.getSize(size);
                    potreeLayer.root.bbox.getCenter(center);

                    // debug.PotreeDebug.initTools(view, potreeLayer, debugGui);
                    // debug.PotreeDebug.initTools(view, potree2Layer, debugGui);

                    customCamera.far = 2.0 * size.length();

                    controls = new CameraControls(customCamera, viewerDiv);
                    controls.fitToBox(potreeLayer.root.bbox, false);
                    const DEG90 = Math.PI * 0.5;
                    controls.rotateTo(DEG90, DEG90, false );

                    // update stats window
                    /*
                    var info = document.getElementById('info');
                    view.addFrameRequester(itowns.MAIN_LOOP_EVENTS.AFTER_RENDER, () => {
                        info.textContent = potreeLayer.displayedCount.toLocaleString() + ' points';
                    });
                    */

                    animate();
                }

                function animate(){
                    const delta = clock.getDelta();
                    const updated = controls.update( delta );
                    if (updated) {
                        // iew.notifyChange(customCamera);
                    }
                    customRenderer.render(scene, customCamera);
                    requestAnimationFrame( animate );
                }

                window.view = globeView;
                Promise.all([globeView.addLayer(potreeLayer)]).then(onLayerReady);
            </script>
    </body>
</html>
